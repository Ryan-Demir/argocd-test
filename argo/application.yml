apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: demo-4
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Ryan-Demir/argocd-test.git
    targetRevision: HEAD
    path: demo4
  destination:
    server: https://kubernetes.default.svc
    namespace: demo-4
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true